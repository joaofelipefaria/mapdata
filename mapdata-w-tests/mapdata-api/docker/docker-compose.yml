version: '3.8'

services:
  mapdata-api:
    container_name: mapdata-api
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://mapdata-db:5432/mapdata_db
      - SPRING_DATASOURCE_USERNAME=mapdata_admin_user
      - SPRING_DATASOURCE_PASSWORD=mapdata_admin_pwd
    networks:
      - mapdata-network

networks:
   mapdata-network:
      external: true
