spring.datasource.url=jdbc:postgresql://localhost:5432/mapdata_db
spring.datasource.username=mapdata_admin_user
spring.datasource.password=mapdata_admin_pwd
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=mapdata-jwt-secret-key-2026-very-secure-and-long-token-value
jwt.expiration=86400000